<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="A placeholder post." />
  <title>My First Post • Minimal Blog</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand-link" href="../index.html" aria-label="Home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Minimal Blog</span>
      </a>

      <nav class="site-nav" aria-label="Primary">
        <a href="../index.html#latest">Latest</a>
        <a href="../index.html#more">More</a>
      </nav>

      <div class="header-actions">
        <button id="themeToggle" class="btn btn-ghost" type="button" aria-pressed="false">
          Theme
        </button>
      </div>
    </div>
  </header>

  <main id="main" class="site-main">
    <article class="container narrow" style="padding: 28px 0 42px;">
      <p style="margin: 0 0 12px;">
        <a class="muted-link" href="../index.html#latest">← Back</a>
      </p>

      <h1 style="margin: 0 0 10px; line-height: 1.1;">My First Post</h1>

      <p style="margin: 0 0 18px; color: var(--muted);">
        <time datetime="2026-02-26">Feb 26, 2026</time> • <span class="tag">Update</span>
      </p>

      <p style="margin: 0 0 14px; color: var(--muted);">
        This is a placeholder post to confirm typography, spacing, and theme behavior.
      </p>

      <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;" />

      <h2>Small structure</h2>
      <p>
        Duplicate your template, rename it, update title/date, and link it on the homepage.
      </p>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner minimal">
      <p>© <span id="year"></span></p>
      <div class="footer-links">
        <a href="#">RSS</a>
      </div>
    </div>
  </footer>

  <script src="../script.js"></script>
  <script src="../darkmode.js"></script>
</body>
</html>
